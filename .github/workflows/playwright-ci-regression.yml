name: Playwright CI – Regression Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: playwright-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-gate:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      should_run: ${{ steps.set_output.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - id: set_output
        run: |
          VAL=$(grep 'enableAutoRun' config/ci-config.json | grep -o 'true\|false')
          echo "should_run=$VAL" >> $GITHUB_OUTPUT

  regression-tests:
    needs: check-gate
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') && needs.check-gate.outputs.should_run == 'true' ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache Playwright
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps
          else
            npx playwright install-deps
          fi
      - name: Run Shard ${{ matrix.shardIndex }}
        continue-on-error: true
        run: npx playwright test --grep @regression --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          ENVIRONMENT: ${{ inputs.environment || 'staging' }}
          CI: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results-shard-${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 1
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-shard-${{ matrix.shardIndex }}
          path: test-results/results.json
          retention-days: 1

  generate-report:
    needs: regression-tests
    if: always()
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Download Results
        uses: actions/download-artifact@v8
        with:
          path: merged-results
          pattern: allure-results-shard-*
          merge-multiple: true
      - name: Download Stats
        uses: actions/download-artifact@v8
        with:
          path: shard-stats
          pattern: test-results-shard-*
      - name: Generate Unified Allure Report
        run: |
          mkdir -p allure-report
          npx allure-commandline generate --clean -o allure-report merged-results || true
      
      # 📦 1. Internal ZIP Artifact (Always available)
      - name: Upload Allure Report (Internal Zip)
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-internal
          path: allure-report
          retention-days: 7

      # 🔍 2. Detect Deployment Mode (Smart Switch)
      - name: Detect Deployment Mode
        id: mode
        run: |
          if [ -n "${{ secrets.PUBLIC_REPO_TOKEN }}" ]; then
            echo "DEPLOY_TARGET=external" >> $GITHUB_OUTPUT
            echo "Target: External Public Repo"
          else
            echo "DEPLOY_TARGET=internal" >> $GITHUB_OUTPUT
            echo "Target: Internal GitHub Pages"
          fi

      # 🚀 3A. Internal Deploy (Official - 0 Warnings)
      - name: Upload Pages Artifact (Internal)
        if: steps.mode.outputs.DEPLOY_TARGET == 'internal'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report
      - name: Deploy Allure (Internal Pages)
        if: steps.mode.outputs.DEPLOY_TARGET == 'internal'
        id: internal_deploy
        uses: actions/deploy-pages@v4

      # 🚀 3B. External Deploy (Versatile - Might show 1 warning)
      - name: Deploy Allure (External Public Repo)
        if: steps.mode.outputs.DEPLOY_TARGET == 'external'
        id: external_deploy
        uses: peaceiris/actions-gh-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          external_repository: ${{ secrets.PUBLIC_REPO_NAME }}
          publish_branch: gh-pages
          publish_dir: ./allure-report

      - name: Set Report URL
        run: |
          if [ "${{ steps.mode.outputs.DEPLOY_TARGET }}" == "external" ]; then
            # Assuming standard GitHub Pages URL format for external repo
            REPO_NAME="${{ secrets.PUBLIC_REPO_NAME }}"
            OWNER="${REPO_NAME%/*}"
            NAME="${REPO_NAME#*/}"
            echo "REPORT_URL=https://${OWNER}.github.io/${NAME}/" >> $GITHUB_ENV
          else
            echo "REPORT_URL=${{ steps.internal_deploy.outputs.page_url }}" >> $GITHUB_ENV
          fi

      - name: Aggregate Test Stats
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const statsDir = 'shard-stats';
          let total = 0, passed = 0, failed = 0;
          let failedTests = new Set();
          if (fs.existsSync(statsDir)) {
            fs.readdirSync(statsDir).forEach(shard => {
              const file = path.join(statsDir, shard, 'results.json');
              if (fs.existsSync(file)) {
                try {
                  const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                  const s = data.stats || {};
                  passed += (s.expected || 0); failed += (s.unexpected || 0);
                  const walk = (suites = []) => {
                    for (const suite of suites) {
                      if (suite.suites) walk(suite.suites);
                      for (const spec of suite.specs || []) {
                        for (const test of spec.tests || []) { if ((test.results || []).some(r => r.status === 'failed')) failedTests.add(spec.title); }
                      }
                    }
                  };
                  walk(data.suites || []);
                } catch (e) { console.error(e); }
              }
            });
          }
          total = passed+failed;
          const failedList = failedTests.size === 0 ? 'None' : Array.from(failedTests).slice(0, 5).join('\\n• ');
          fs.appendFileSync(process.env.GITHUB_ENV, `TOTAL=${total}\nPASSED=${passed}\nFAILED=${failed}\nFAILED_TESTS=${failedList}\n`);
          EOF
      - name: Create Unified Job Summary
        if: always()
        run: |
          echo "## 📊 Regression Suite Executive Summary (Sharded)" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ **Total Passed** | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ **Total Failed** | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| 📈 **Total Executed** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Full Allure Report]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then exit 0; fi
          STATUS="${{ needs.regression-tests.result }}"; COLOR="#36a64f"
          if [ "$STATUS" != "success" ]; then COLOR="#ff0000"; fi
          curl -X POST -H 'Content-type: application/json' --data "{ \"attachments\": [{ \"color\": \"$COLOR\", \"title\": \"Regression Results\", \"text\": \"*Status:* $STATUS\n*Summary:* $PASSED/$TOTAL Passed\n\n*Report URL:* $REPORT_URL\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View CI Run>\" }] }" $SLACK_WEBHOOK_URL
