name: Playwright CI – Master Full Suite

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: playwright-master-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: "--no-warnings"
    
    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # ⭐ Cache Playwright browsers
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      # 4️⃣ Install Playwright browsers
      - name: Install Playwright Browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps
          else
            npx playwright install-deps
          fi

      # 🌍 Resolve ENVIRONMENT
      - name: Resolve Environment
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            echo "ENVIRONMENT=${{ inputs.environment }}" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
          fi

      # 5️⃣ RUN FULL SUITE (Tiered Execution)
      # Tier 1: Core Parallel Tests (All tests except specific flows)
      - name: Run Tier 1 - Core Parallel Tests
        continue-on-error: true
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          CI: true
        run: |
          echo "Running Tier 1 (Parallel Core) on $ENVIRONMENT"
          npx playwright test --project=default

      # Tier 2: Serial E2E Journeys (Stability priority)
      - name: Run Tier 2 - Serial E2E Journeys
        continue-on-error: true
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          CI: true
        run: |
          echo "Running Tier 2 (Serial Flows) on $ENVIRONMENT"
          npx playwright test --project=e2e-flows

      # 6️⃣ Optional severity gate
      - name: Fail build on critical failures
        run: |
          if [ -f scripts/check-critical.js ]; then
            node scripts/check-critical.js || true
          else
            echo "No critical check script found"
          fi

      # 6️⃣ Generate Allure
      - name: Generate Allure Report
        if: always()
        run: |
          mkdir -p allure-report
          npx allure-commandline generate --clean -o allure-report ./allure-results || true

      # 7️⃣ Upload Reports
      - name: Upload Allure Report Artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-master
          path: allure-report
          retention-days: 3

      - name: Upload Playwright HTML Report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-master
          path: playwright-report
          retention-days: 3

      # 🔍 Detect Deployment Mode
      - name: Detect Deployment Mode
        id: deploy_mode
        run: |
          if [ -n "${{ secrets.GH_PAGES_TOKEN }}" ]; then
            echo "mode=external" >> $GITHUB_OUTPUT
          else
            echo "mode=internal" >> $GITHUB_OUTPUT
          fi

      # 8️⃣ Deploy to GitHub Pages
      - name: Deploy Allure (Internal)
        if: steps.deploy_mode.outputs.mode == 'internal'
        uses: peaceiris/actions-gh-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          NODE_OPTIONS: "--no-warnings"
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
          user_name: github-actions
          user_email: github-actions@github.com

      - name: Deploy Allure (External Public Repo)
        if: steps.deploy_mode.outputs.mode == 'external'
        uses: peaceiris/actions-gh-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          NODE_OPTIONS: "--no-warnings"
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}
          external_repository: qaverseTesting/abcdefg_ooooo
          publish_branch: gh-pages
          publish_dir: ./allure-report
          user_name: github-actions
          user_email: github-actions@github.com

      # 🔄 Set Dynamic Allure URL
      - name: Set Allure URL
        run: |
          if [ "${{ steps.deploy_mode.outputs.mode }}" = "external" ]; then
            echo "ALLURE_URL=https://qaverseTesting.github.io/abcdefg_ooooo/" >> $GITHUB_ENV
          else
            echo "ALLURE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/" >> $GITHUB_ENV
          fi

      # 📊 Collect Playwright test statistics
      - name: Collect Test Stats
        if: always()
        run: |
          node - <<'EOF'
          const fs = require('fs');

          const file = 'test-results/results.json';
          if (!fs.existsSync(file)) {
            fs.appendFileSync(process.env.GITHUB_ENV,
              'TOTAL=0\nPASSED=0\nFAILED=0\nSKIPPED=0\nFLAKY=0\nFAILED_TESTS=None\n'
            );
            process.exit(0);
          }

          const data = JSON.parse(fs.readFileSync(file, 'utf8'));
          const stats = data.stats || {};

          const passed = stats.expected || 0;
          const failed = stats.unexpected || 0;
          const skipped = stats.skipped || 0;
          const flaky = stats.flaky || 0;
          const total = passed + failed + skipped + flaky;

          const failedTests = new Set();

          function walkSuites(suites = []) {
            for (const suite of suites) {
              if (suite.suites) walkSuites(suite.suites);
              for (const spec of suite.specs || []) {
                for (const test of spec.tests || []) {
                  if ((test.results || []).some(r => r.status === 'failed')) {
                    failedTests.add(spec.title);
                  }
                }
              }
            }
          }

          walkSuites(data.suites || []);

          const failedList =
            failedTests.size === 0
              ? 'None'
              : Array.from(failedTests).slice(0, 5).join('\\n• ');

          fs.appendFileSync(process.env.GITHUB_ENV, `TOTAL=${total}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `PASSED=${passed}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `FAILED=${failed}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `SKIPPED=${skipped}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `FLAKY=${flaky}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `FAILED_TESTS=${failedList}\n`);
          EOF

      # 9️⃣ CI Summary
      - name: Add CI Summary Links
        if: always()
        run: |
          echo "## 🏆 Master CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "Manual trigger execution of the full test suite." >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ **Passed** | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ **Failed** | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| 📈 **Total** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Detailed Reports" >> $GITHUB_STEP_SUMMARY
          echo "👉 [Allure Online]($ALLURE_URL)" >> $GITHUB_STEP_SUMMARY
          echo "👉 **Playwright HTML:** Download \`playwright-html-report-master\` from the **Artifacts** section at the bottom of this page ⬇️" >> $GITHUB_STEP_SUMMARY

      # 🔟 Slack Notification
      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          COLOR="#36a64f"

          if [ "$STATUS" != "success" ]; then
            COLOR="#ff0000"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [{
              \"color\": \"$COLOR\",
              \"title\": \"MASTER CI: Full Suite Execution\",
              \"text\": \"*Workflow:* ${{ github.workflow }}\n*Status:* $STATUS\n*Environment:* $ENVIRONMENT\n\n*Test Summary*\n• Total: *$TOTAL*\n• Passed: *$PASSED*\n• Failed: *$FAILED*\n• Skipped: *$SKIPPED*\n• Flaky: *$FLAKY*\n\n*Failed Tests (Top 5)*\n• $FAILED_TESTS\n\n*Allure Report:* $ALLURE_URL\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Master CI Run>\"
            }]
          }" $SLACK_WEBHOOK_URL
