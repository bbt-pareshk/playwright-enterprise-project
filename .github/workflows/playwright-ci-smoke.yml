name: Playwright CI – Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - live

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: playwright-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-gate:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      should_run: ${{ steps.set_output.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - id: set_output
        run: |
          VAL=$(grep 'enableAutoRun' config/ci-config.json | grep -o 'true\|false')
          echo "should_run=$VAL" >> $GITHUB_OUTPUT

  smoke-tests:
    needs: check-gate
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') && needs.check-gate.outputs.should_run == 'true' ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps
          else
            npx playwright install-deps
          fi
      - name: Resolve Env
        run: |
          if [ -n "${{ inputs.environment }}" ]; then echo "ENVIRONMENT=${{ inputs.environment }}" >> $GITHUB_ENV
          else echo "ENVIRONMENT=staging" >> $GITHUB_ENV
          fi
      - name: Run Smoke Tests
        continue-on-error: true
        run: npx playwright test --grep @smoke
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          CI: true
      - name: Generate Allure
        run: |
          mkdir -p allure-report
          npx allure-commandline generate --clean -o allure-report ./allure-results || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 3
      - name: Deploy Allure
        uses: peaceiris/actions-gh-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-report
      - name: Aggregate Summary
        if: always()
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const file = 'test-results/results.json';
          if (fs.existsSync(file)) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            const s = data.stats || {};
            const total = (s.expected || 0) + (s.unexpected || 0) + (s.skipped || 0) + (s.flaky || 0);
            fs.appendFileSync(process.env.GITHUB_ENV, `TOTAL=${total}\nPASSED=${s.expected || 0}\n`);
          } else {
            fs.appendFileSync(process.env.GITHUB_ENV, `TOTAL=0\nPASSED=0\n`);
          }
          EOF
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then exit 0; fi
          STATUS="${{ job.status }}"; COLOR="#36a64f"
          if [ "$STATUS" != "success" ]; then COLOR="#ff0000"; fi
          curl -X POST -H 'Content-type: application/json' --data "{ \"attachments\": [{ \"color\": \"$COLOR\", \"title\": \"Smoke Results\", \"text\": \"*Status:* $STATUS\n*Summary:* $PASSED/$TOTAL Passed\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View CI Run>\" }] }" $SLACK_WEBHOOK_URL
